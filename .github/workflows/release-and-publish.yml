name: Release and publish

# Latest action releases checked on 2026-04-28:
# - actions/checkout v6.0.2
# - actions/setup-dotnet v5.2.0
# - actions/upload-artifact v7.0.1
# - actions/download-artifact v8.0.1

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, with or without the leading v"
        required: true
        type: string

permissions:
  contents: write

env:
  APP_NAME: azimg
  DOTNET_VERSION: 10.0.x
  PROJECT_PATH: src/AzureOpenAI.ImageGen.Cli/AzureOpenAI.ImageGen.Cli.csproj
  SOLUTION_PATH: AzureOpenAI.ImageGen.Cli.slnx

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      version: ${{ steps.vars.outputs.version }}
      release_url: ${{ steps.vars.outputs.release_url }}
    steps:
      - id: vars
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            raw_version='${{ inputs.version }}'
            version="${raw_version#v}"
            tag="v${version}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_url=https://github.com/${GITHUB_REPOSITORY}/releases/tag/${tag}" >> "$GITHUB_OUTPUT"

  test:
    name: Test solution
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run test suite
        run: dotnet test ${{ env.SOLUTION_PATH }}

  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}
    needs:
      - prepare
      - test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            rid: osx-arm64
            asset_name: azimg-darwin-arm64.tar.gz
            artifact_name: release-osx-arm64
          - runner: ubuntu-latest
            rid: linux-x64
            asset_name: azimg-linux-x64.tar.gz
            artifact_name: release-linux-x64
          - runner: windows-latest
            rid: win-x64
            asset_name: azimg-windows-x64.exe
            artifact_name: release-win-x64
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Linux Native AOT prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang binutils zlib1g-dev

      - name: Publish Native AOT
        run: dotnet publish ${{ env.PROJECT_PATH }} -c Release -r ${{ matrix.rid }} -p:PublishAot=true

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          publish_dir="src/AzureOpenAI.ImageGen.Cli/bin/Release/net10.0/${{ matrix.rid }}/publish"
          stage_dir="$RUNNER_TEMP/package"

          rm -rf "$stage_dir"
          mkdir -p "$stage_dir"
          cp "$publish_dir/${APP_NAME}" "$stage_dir/${APP_NAME}"

          tar -C "$stage_dir" -czf "$RUNNER_TEMP/${{ matrix.asset_name }}" "${APP_NAME}"

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $publishDir = "src/AzureOpenAI.ImageGen.Cli/bin/Release/net10.0/${{ matrix.rid }}/publish"
          Copy-Item "$publishDir/azimg.exe" "$env:RUNNER_TEMP/${{ matrix.asset_name }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ runner.temp }}/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    outputs:
      tag: ${{ needs.prepare.outputs.tag }}
      version: ${{ needs.prepare.outputs.version }}
      release_url: ${{ needs.prepare.outputs.release_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Download macOS artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-osx-arm64
          path: ${{ runner.temp }}/release-assets

      - name: Download Linux artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-linux-x64
          path: ${{ runner.temp }}/release-assets

      - name: Download Windows artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-win-x64
          path: ${{ runner.temp }}/release-assets

      - name: Create checksums
        shell: bash
        run: |
          set -euo pipefail

          cd "$RUNNER_TEMP/release-assets"
          sha256sum \
            azimg-darwin-arm64.tar.gz \
            azimg-linux-x64.tar.gz \
            azimg-windows-x64.exe \
            > checksums.txt

      - name: Create tag for manual release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ needs.prepare.outputs.tag }}"
          if git rev-parse --verify "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists."
            exit 0
          fi

          git tag -a "$tag" -m "Release $tag" "${GITHUB_SHA}"
          git push origin "$tag"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          cd "$RUNNER_TEMP/release-assets"
          tag="${{ needs.prepare.outputs.tag }}"
          version="${{ needs.prepare.outputs.version }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" \
              azimg-darwin-arm64.tar.gz \
              azimg-linux-x64.tar.gz \
              azimg-windows-x64.exe \
              checksums.txt \
              --clobber
          else
            gh release create "$tag" \
              azimg-darwin-arm64.tar.gz \
              azimg-linux-x64.tar.gz \
              azimg-windows-x64.exe \
              checksums.txt \
              --title "azimg $version" \
              --generate-notes
          fi

  publish-homebrew:
    name: Publish Homebrew formula
    runs-on: ubuntu-latest
    needs:
      - prepare
      - release
    if: ${{ vars.HOMEBREW_TAP_REPOSITORY != '' }}
    steps:
      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "HOMEBREW_TAP_TOKEN is not configured."
            exit 1
          fi

          tag='${{ needs.prepare.outputs.tag }}'
          version='${{ needs.prepare.outputs.version }}'
          repo="${GITHUB_REPOSITORY}"
          mac_asset='azimg-darwin-arm64.tar.gz'
          linux_asset='azimg-linux-x64.tar.gz'
          mac_url="https://github.com/${repo}/releases/download/${tag}/${mac_asset}"
          linux_url="https://github.com/${repo}/releases/download/${tag}/${linux_asset}"

          curl -fsSL "$mac_url" -o mac.tar.gz
          curl -fsSL "$linux_url" -o linux.tar.gz

          mac_sha="$(sha256sum mac.tar.gz | awk '{print $1}')"
          linux_sha="$(sha256sum linux.tar.gz | awk '{print $1}')"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPOSITORY}.git" tap
          mkdir -p tap/Formula

          cat > tap/Formula/azimg.rb <<EOF
          class Azimg < Formula
            desc "Azure OpenAI image generation CLI"
            homepage "https://github.com/${repo}"
            version "${version}"

            on_macos do
              if Hardware::CPU.arm?
                url "${mac_url}"
                sha256 "${mac_sha}"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "${linux_url}"
                sha256 "${linux_sha}"
              end
            end

            def install
              bin.install "azimg"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/azimg version")
            end
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- Formula/azimg.rb; then
            echo "Homebrew formula already up to date."
            exit 0
          fi

          git add Formula/azimg.rb
          git commit -m "azimg ${version}"
          git push

  publish-winget:
    name: Publish WinGet manifest
    runs-on: windows-latest
    needs:
      - prepare
      - release
    if: ${{ vars.WINGET_CREATE_MODE != '' || vars.WINGET_PACKAGE_IDENTIFIER != '' }}
    steps:
      - name: Install WingetCreate
        shell: pwsh
        run: Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Create or update WinGet manifest
        shell: pwsh
        env:
          WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}
          WINGET_CREATE_MODE: ${{ vars.WINGET_CREATE_MODE }}
          WINGET_PACKAGE_IDENTIFIER: ${{ vars.WINGET_PACKAGE_IDENTIFIER }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_URL: ${{ needs.prepare.outputs.release_url }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINGET_CREATE_GITHUB_TOKEN)) {
            throw "WINGET_CREATE_GITHUB_TOKEN is not configured."
          }

          $mode = if ([string]::IsNullOrWhiteSpace($env:WINGET_CREATE_MODE)) { "update" } else { $env:WINGET_CREATE_MODE.ToLowerInvariant() }
          $installerUrl = "https://github.com/$($env:GITHUB_REPOSITORY)/releases/download/$($env:RELEASE_TAG)/azimg-windows-x64.exe"

          if ($mode -eq "new") {
            .\wingetcreate.exe new $installerUrl --token $env:WINGET_CREATE_GITHUB_TOKEN --no-open
            exit $LASTEXITCODE
          }

          if ([string]::IsNullOrWhiteSpace($env:WINGET_PACKAGE_IDENTIFIER)) {
            throw "Set the WINGET_PACKAGE_IDENTIFIER repository variable or switch WINGET_CREATE_MODE to 'new' for the first submission."
          }

          .\wingetcreate.exe update $env:WINGET_PACKAGE_IDENTIFIER `
            --urls "$installerUrl|x64" `
            --version $env:RELEASE_VERSION `
            --release-notes-url $env:RELEASE_URL `
            --submit `
            --token $env:WINGET_CREATE_GITHUB_TOKEN `
            --no-open
