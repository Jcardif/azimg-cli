name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string
      publish_mode:
        description: "Publish mode"
        required: true
        default: "single-file"
        type: choice
        options:
          - "single-file"
          - "aot"
      release_notes_path:
        description: "Curated release notes markdown path"
        required: false
        default: ""
        type: string

permissions:
  contents: write

env:
  DOTNET_VERSION: "10.0.x"
  PROJECT_PATH: src/AzImg.Cli/AzImg.Cli.csproj
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
  PUBLISH_MODE: ${{ github.event.inputs.publish_mode || 'single-file' }}
  RELEASE_NOTES_PATH: ${{ github.event.inputs.release_notes_path || '' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Test
        run: dotnet test AzImg.Cli.slnx --configuration Release

  package:
    name: Package ${{ matrix.rid }}
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            runner: windows-latest
            executable: azimg.exe
            archiveType: zip
            canRun: true
          - rid: win-arm64
            runner: windows-latest
            executable: azimg.exe
            archiveType: zip
            canRun: false
          - rid: osx-arm64
            runner: macos-latest
            executable: azimg
            archiveType: tar.gz
            canRun: true
          - rid: linux-x64
            runner: ubuntu-latest
            executable: azimg
            archiveType: tar.gz
            canRun: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Linux Native AOT prerequisites
        if: env.PUBLISH_MODE == 'aot' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Publish
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG.TrimStart('v')
          $publishDir = Join-Path $PWD "artifacts/publish/${{ matrix.rid }}"
          $publishArgs = @(
            'publish', $env:PROJECT_PATH,
            '--configuration', 'Release',
            '--runtime', '${{ matrix.rid }}',
            '--self-contained', 'true',
            '--output', $publishDir,
            "-p:Version=$version",
            '-p:PublishSingleFile=true',
            '-p:EnableCompressionInSingleFile=true'
          )
          if ($env:PUBLISH_MODE -eq 'aot') {
            $publishArgs += '-p:PublishAot=true'
          }
          dotnet @publishArgs

      - name: Smoke test
        if: matrix.canRun == true
        shell: pwsh
        run: |
          $exe = Join-Path $PWD "artifacts/publish/${{ matrix.rid }}/${{ matrix.executable }}"
          if ('${{ matrix.rid }}' -eq 'osx-arm64' -and (-not $IsMacOS -or (uname -m) -ne 'arm64')) {
            Write-Host "Skipping osx-arm64 smoke test because this runner is not macOS ARM64."
            exit 0
          }
          if (-not $IsWindows) { chmod +x $exe }
          & $exe version
          & $exe --help

      - name: Package archive
        shell: pwsh
        run: |
          $packageDir = Join-Path $PWD "artifacts/packages"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          $publishDir = Join-Path $PWD "artifacts/publish/${{ matrix.rid }}"
          $archiveName = "azimg-${{ matrix.rid }}.${{ matrix.archiveType }}"
          $archivePath = Join-Path $packageDir $archiveName
          Push-Location $publishDir
          if ('${{ matrix.archiveType }}' -eq 'zip') {
            Compress-Archive -Path '${{ matrix.executable }}' -DestinationPath $archivePath -Force
          } else {
            tar -czf $archivePath '${{ matrix.executable }}'
          }
          Pop-Location

      - name: Upload package artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: package-${{ matrix.rid }}
          path: artifacts/packages/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Download package artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums and manifest
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $releaseTag = $env:RELEASE_TAG
          $version = $releaseTag.TrimStart('v')
          $files = Get-ChildItem -Path dist -File | Where-Object { $_.Name -like 'azimg-*' } | Sort-Object Name
          $assets = @()
          $sumLines = @()

          foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 -Path $file.FullName).Hash.ToLowerInvariant()
            $sumLines += "$hash  $($file.Name)"

            if ($file.Name -match '^azimg-(?<rid>.+)\.(?<archive>zip|tar\.gz)$') {
              $rid = $Matches.rid
              $archiveType = $Matches.archive
              $parts = $rid.Split('-', 2)
              $assets += [ordered]@{
                rid = $rid
                fileName = $file.Name
                sha256 = $hash
                sizeBytes = $file.Length
                archiveType = $archiveType
                os = $parts[0]
                architecture = $parts[1]
                downloadUrl = "https://github.com/${{ github.repository }}/releases/download/$releaseTag/$($file.Name)"
              }
            }
          }

          $sumLines | Set-Content -Path dist/SHA256SUMS -NoNewline:$false
          $manifest = [ordered]@{
            product = 'AzImg CLI'
            repository = '${{ github.repository }}'
            version = $version
            tagName = $releaseTag
            publishMode = '${{ env.PUBLISH_MODE }}'
            assets = $assets
          }
          $manifest | ConvertTo-Json -Depth 6 | Set-Content -Path dist/azimg-release.json -NoNewline:$false

      - name: Prepare release notes
        shell: pwsh
        run: |
          $notesPath = $env:RELEASE_NOTES_PATH
          if ([string]::IsNullOrWhiteSpace($notesPath)) {
            $notesPath = "docs/release-notes/$env:RELEASE_TAG.md"
          }

          $outputPath = "dist/RELEASE_NOTES.md"
          if (Test-Path $notesPath) {
            Copy-Item -Path $notesPath -Destination $outputPath -Force
            Write-Host "Using curated release notes from $notesPath."
          } else {
            Set-Content -Path $outputPath -Value "" -NoNewline
            Write-Host "No curated release notes found at $notesPath."
            Write-Host "GitHub generated release notes will be used by themselves."
          }

      - name: Publish release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: dist/RELEASE_NOTES.md
          files: |
            dist/azimg-*.zip
            dist/azimg-*.tar.gz
            dist/SHA256SUMS
            dist/azimg-release.json
          generate_release_notes: true
